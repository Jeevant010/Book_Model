# RAG System Configuration
rag:
  embedding:
    model: "all-MiniLM-L6-v2"
    chunk_size: 1000
    chunk_overlap: 200

  vectorstore:
    persist_dir: "faiss_store"
    index_type: "faiss"

  llm:
    provider: "groq"
    model: "llama-3.1-8b-instant"
    temperature: 0.1
    max_tokens: 1000

  retrieval:
    top_k: 5
    similarity_threshold: 0.7

# API Configuration
api:
  host: "0.0.0.0"
  port: 8000
  cors_origins: "*"
  reload: true

# Data Configuration
data:
  input_dir: "data"
  supported_formats:
    - "pdf"
    - "txt"
    - "csv"
    - "xlsx"
    - "docx"
    - "json"

# Logging Configuration
logging:
  level: "INFO"
  format: "[%(levelname)s] %(asctime)s - %(name)s - %(message)s"
