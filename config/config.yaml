# Environment-specific Configuration
environment: "development"

# Database and Storage Settings
storage:
  faiss_store_path: "faiss_store"
  backup_enabled: true
  backup_frequency: "daily"

# Model Configuration
models:
  embedding:
    provider: "sentence-transformers"
    model_name: "all-MiniLM-L6-v2"
    device: "cpu" # or "cuda" if GPU available

  llm:
    provider: "groq"
    model_name: "llama-3.1-8b-instant"
    api_key_env: "GROQ_API_KEY"
    parameters:
      temperature: 0.1
      max_tokens: 1000
      top_p: 0.9

# Processing Settings
processing:
  text_splitter:
    type: "recursive_character"
    chunk_size: 1000
    chunk_overlap: 200
    separators: ["\n\n", "\n", " ", ""]

  batch_processing:
    enabled: true
    batch_size: 100

# API Settings
api:
  server:
    host: "0.0.0.0"
    port: 8000
    workers: 1
    reload: true

  security:
    cors_enabled: true
    cors_origins: ["*"]
    rate_limiting: false

  features:
    health_check: true
    metrics: false
    documentation: true

# Logging and Monitoring
logging:
  level: "INFO"
  file_enabled: false
  file_path: "logs/app.log"
  console_enabled: true

monitoring:
  metrics_enabled: false
  health_checks: true

# Development Settings
development:
  debug: true
  hot_reload: true

# Production Settings (override in production)
production:
  debug: false
  workers: 4
  logging_level: "WARNING"
